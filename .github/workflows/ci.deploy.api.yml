name: ci.deploy.api

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - "api/**"
      - "docker-compose.yml"
      - ".github/workflows/ci.deploy.api.yml"
  pull_request:
    paths:
      - "api/**"
      - "docker-compose.yml"
      - ".github/workflows/ci.deploy.api.yml"

jobs:
  build-test-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        working-directory: api
        run: cargo test --locked

      - name: Build API image
        run: docker build ./api

      - name: Setup Buildx
        if: github.event_name != 'pull_request'
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push API image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: ./api
          push: true
          tags: |
            ghcr.io/liberte-top/app-smoke-api:main
            ghcr.io/liberte-top/app-smoke-api:sha-${{ github.sha }}

      - name: Checkout kubernetes repo
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v5
        with:
          repository: liberte-top/kubernetes
          ref: main
          token: ${{ secrets.KUBERNETES_REPO_TOKEN }}
          path: kubernetes

      - name: Setup Helm
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          if command -v helm >/dev/null 2>&1; then
            helm version
            exit 0
          fi
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Update smoke-api image tag
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('kubernetes/charts/app/smoke/values.yaml')
          replacement = '    tag: sha-${{ github.sha }} # smoke-api-image'
          lines = []
          for line in path.read_text().splitlines():
            if line.strip().endswith('# smoke-api-image'):
              line = replacement
            lines.append(line)
          path.write_text('\n'.join(lines) + '\n')
          PY
          helm template app-smoke kubernetes/charts/app/smoke --namespace service > kubernetes/manifests/service/smoke/rendered.yaml

      - name: Create kubernetes promotion PR
        if: github.event_name != 'pull_request'
        id: create_pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.KUBERNETES_REPO_TOKEN }}
          path: kubernetes
          branch: promote/smoke-api-${{ github.sha }}
          delete-branch: true
          commit-message: "chore: promote smoke-api image"
          title: "chore: promote smoke-api image"
          body: |
            Update `smoke-api` to `ghcr.io/liberte-top/app-smoke-api:sha-${{ github.sha }}`.

      - name: Enable PR auto-merge
        if: github.event_name != 'pull_request' && steps.create_pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.KUBERNETES_REPO_TOKEN }}
        run: |
          set -euo pipefail
          pr_number="${{ steps.create_pr.outputs.pull-request-number }}"
          gh pr merge --repo "liberte-top/kubernetes" --squash "$pr_number" || {
            gh pr update-branch --repo "liberte-top/kubernetes" "$pr_number" --rebase
            gh pr merge --repo "liberte-top/kubernetes" --squash "$pr_number"
          }
