name: ci.deploy.web

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - "web/**"
      - "docker-compose.yml"
      - ".github/workflows/ci.deploy.web.yml"
  pull_request:
    paths:
      - "web/**"
      - "docker-compose.yml"
      - ".github/workflows/ci.deploy.web.yml"

jobs:
  build-test-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"

      - name: Configure GitHub Packages auth
        run: |
          set -euo pipefail
          cat > "$HOME/.npmrc" <<EOF
          @liberte-top:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}
          EOF
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable corepack pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.28.0 --activate

      - name: Install dependencies
        working-directory: web
        run: pnpm install --no-frozen-lockfile

      - name: Build web
        working-directory: web
        env:
          VITE_ENV_LABEL: ci
        run: pnpm build

      - name: Build web image
        run: docker build -f ./web/Dockerfile ..

      - name: Setup Buildx
        if: github.event_name != 'pull_request'
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push web image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: ..
          file: ../app.smoke/web/Dockerfile
          push: true
          tags: |
            ghcr.io/liberte-top/app-smoke-web:main
            ghcr.io/liberte-top/app-smoke-web:sha-${{ github.sha }}

      - name: Checkout kubernetes repo
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v5
        with:
          repository: liberte-top/kubernetes
          ref: main
          token: ${{ secrets.KUBERNETES_REPO_TOKEN }}
          path: kubernetes

      - name: Update smoke-web image tag
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('kubernetes/charts/app/smoke/values.yaml')
          replacement = '    tag: sha-${{ github.sha }} # smoke-web-image'
          lines = []
          for line in path.read_text().splitlines():
            if line.strip().endswith('# smoke-web-image'):
              line = replacement
            lines.append(line)
          path.write_text('\n'.join(lines) + '\n')
          PY
      - name: Create kubernetes promotion PR
        if: github.event_name != 'pull_request'
        id: create_pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.KUBERNETES_REPO_TOKEN }}
          path: kubernetes
          branch: promote/smoke-web-${{ github.sha }}
          delete-branch: true
          commit-message: "chore: promote smoke-web image"
          title: "chore: promote smoke-web image"
          body: |
            Update `smoke-web` to `ghcr.io/liberte-top/app-smoke-web:sha-${{ github.sha }}`.

      - name: Enable PR auto-merge
        if: github.event_name != 'pull_request' && steps.create_pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.KUBERNETES_REPO_TOKEN }}
        run: |
          set -euo pipefail
          pr_number="${{ steps.create_pr.outputs.pull-request-number }}"
          gh pr merge --repo "liberte-top/kubernetes" --squash "$pr_number" || {
            gh pr update-branch --repo "liberte-top/kubernetes" "$pr_number" --rebase
            gh pr merge --repo "liberte-top/kubernetes" --squash "$pr_number"
          }
